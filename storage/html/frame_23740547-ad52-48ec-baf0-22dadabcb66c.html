<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: #09090b;
}

.page {
  position: relative;
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  background: linear-gradient(180deg, #111827, #020617);
}

.bg {
  position: absolute;
  inset: 0;
  background-image: url('file:///Users/local/Documents/demo-ai/storage/images/c61679bb-1fc4-4742-be3f-0a0682604abb.jpg');
  background-size: cover;
  background-position: center;
  filter: blur(40px);
  transform: scale(1.2);
  opacity: 0.45;
}

.card {
  position: absolute;
  top: 180px;
  left: 90px;
  width: 900px;
  height: 1020px;
  border-radius: 56px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);
  box-shadow: 0 40px 120px rgba(0,0,0,0.55);
  overflow: hidden;
  border: 2px solid rgba(255,255,255,0.18);
}

.product {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.badge {
  position: absolute;
  top: 80px;
  left: 80px;
  padding: 22px 38px;
  border-radius: 999px;
  background: #ff0050;
  color: white;
  font-size: 46px;
  font-weight: 900;
  box-shadow: 0 12px 40px rgba(255,0,80,0.45);
}

.title {
  position: absolute;
  top: 1250px;
  left: 70px;
  right: 70px;
  color: white;
  font-size: 76px;
  font-weight: 900;
  line-height: 1.12;
  text-align: center;
  text-shadow: 0 8px 24px rgba(0,0,0,0.9);
}

.caption {
  position: absolute;
  top: 1430px;
  left: 80px;
  right: 80px;
  color: white;
  font-size: 58px;
  font-weight: 800;
  line-height: 1.18;
  text-align: center;
  text-shadow:
    0 5px 0 #000,
    0 8px 30px rgba(0,0,0,0.8);
}

.cta {
  position: absolute;
  left: 180px;
  right: 180px;
  bottom: 150px;
  height: 130px;
  border-radius: 70px;
  background: linear-gradient(90deg, #ff0050, #ff7a00);
  color: white;
  font-size: 56px;
  font-weight: 900;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 20px 60px rgba(255,0,80,0.5);
}

.progress {
  position: absolute;
  left: 80px;
  right: 80px;
  bottom: 70px;
  height: 14px;
  border-radius: 99px;
  background: rgba(255,255,255,0.18);
}

.progress-inner {
  width: 65%;
  height: 100%;
  border-radius: 99px;
  background: white;
}
</style>
</head>
<body>
<div class="page">
  <div class="bg"></div>

  <div class="card">
    <img class="product" src="file:///Users/local/Documents/demo-ai/storage/images/c61679bb-1fc4-4742-be3f-0a0682604abb.jpg"/>
  </div>

  <div class="badge">🔥 HOT</div>

  <div class="title">Áo bồ đào nha</div>

  <div class="caption">Nhanh tay bấm vào giỏ
hàng để rước em nó về
liền nha.</div>

  <div class="cta">👇 Xem ở giỏ hàng</div>

  <div class="progress">
    <div class="progress-inner"></div>
  </div>
</div>
</body>
</html>
