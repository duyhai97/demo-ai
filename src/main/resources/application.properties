spring.application.name=backen-ai
openrouter.api-key=${OPENROUTER_API_KEY}
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB
server.tomcat.max-http-form-post-size=200MB
server.tomcat.max-swallow-size=200MB

app.jwt.secret=demo-ai-super-secret-key-demo-ai-super-secret-key-123456
app.jwt.expiration-ms=86400000

spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:tiktok_ai}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

app.admin.username=admin
app.admin.password=123456
app.admin.full-name=System Administrator
app.admin.email=admin@demo-ai.com